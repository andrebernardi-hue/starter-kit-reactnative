<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generic Screens — DS Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-neutral-high-extra-light);
      font-family: var(--font-family-base);
      color: var(--fg2);
    }

    /* ── Toolkit topbar ───────────────────────────────── */
    .topbar {
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--spacing-xxs);
      gap: var(--spacing-xxxs);
      box-shadow: var(--shadow-level1);
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    .topbar-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      color: var(--color-primary-pure);
      text-decoration: none;
    }

    .topbar-back:hover { color: var(--color-primary-dark); }

    .topbar-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    .topbar-title {
      font-size: var(--font-size-xxs);
      font-weight: var(--font-weight-bold);
      color: var(--fg1);
    }

    .topbar-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--fg4);
    }

    .topbar-reset {
      font-size: 12px;
      font-weight: var(--font-weight-medium);
      color: var(--color-primary-pure);
      background: var(--color-primary-light);
      border: none;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-family-base);
    }

    .topbar-reset:hover { background: var(--color-primary-medium); }

    .app-layout {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .canvas-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    .canvas-wrap.dragging { cursor: grabbing; }

    .canvas-inner {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .canvas-content {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: var(--spacing-xxl);
      padding: var(--spacing-xxl);
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xxxs);
    }

    .section-label {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-lg);
      color: var(--fg4);
      padding-bottom: 4px;
    }

    .section-phones {
      display: flex;
      gap: var(--spacing-xs);
      align-items: flex-start;
    }

    .phone-col {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-nano);
      align-items: center;
    }

    .phone-name {
      font-size: 11px;
      font-weight: var(--font-weight-medium);
      color: var(--fg3);
      text-align: center;
    }

    /* ═══════════════════════════════════════════════════════════
       DS COMPONENT CLASSES
       Mirror the widgets defined in toolkit/index.html so every
       screen pulls chrome straight from tokens.css.
    ═══════════════════════════════════════════════════════════ */

    /* ── App header (large title, iOS style) ────────────── */
    .ds-phone-header-large {
      padding: 10px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-nano);
    }
    .ds-phone-header-large.bordered {
      border-bottom: 1px solid var(--border-subtle);
    }
    .ds-phone-header-large .title {
      font-family: var(--font-family-editorial);
      font-size: 30px;
      font-weight: var(--font-weight-medium);
      letter-spacing: -0.01em;
      color: var(--fg1);
      line-height: 1.1;
    }
    .ds-phone-header-large .subtitle {
      font-size: 12px;
      color: var(--fg3);
      margin-top: 2px;
    }
    .ds-phone-header-large .actions {
      display: flex;
      gap: 10px;
    }

    /* ── App header (compact, centered title) ───────────── */
    .ds-phone-header-compact {
      padding: 10px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-nano);
    }
    .ds-phone-header-compact .title {
      font-family: var(--font-family-editorial);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--fg1);
    }

    /* ── Icon buttons (36px squircles) ───────────────────── */
    .ds-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 0;
      transition: background var(--duration-fast) var(--ease-standard);
    }
    .ds-icon-btn.primary { background: var(--color-primary-light); color: var(--color-primary-pure); }
    .ds-icon-btn.primary-solid { background: var(--color-primary-pure); color: var(--color-fg-on-primary); }
    .ds-icon-btn.neutral { background: var(--color-neutral-high-light); color: var(--fg2); }
    .ds-icon-btn.ghost { background: transparent; color: var(--fg2); }

    /* ── Search bar (pill input) ─────────────────────────── */
    .ds-search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 14px;
      background: var(--color-neutral-high-light);
      border-radius: var(--radius-full);
    }
    .ds-search-bar input {
      flex: 1;
      border: 0;
      background: transparent;
      outline: none;
      font-family: var(--font-family-base);
      font-size: var(--font-size-xxs);
      color: var(--fg1);
    }
    .ds-search-bar input::placeholder { color: var(--fg4); }
    .ds-search-bar.sm { height: 40px; }

    /* ── List row ────────────────────────────────────────── */
    .ds-list-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .ds-list-row:last-child { border-bottom: 0; }
    .ds-list-row .leading {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--color-primary-light);
      color: var(--color-primary-pure);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ds-list-row .leading.danger {
      background: var(--color-error-light);
      color: var(--color-error-dark);
      opacity: 0.85;
    }
    .ds-list-row .body { flex: 1; min-width: 0; }
    .ds-list-row .title {
      font-family: var(--font-family-base);
      font-weight: var(--font-weight-medium);
      font-size: var(--font-size-xxs);
      color: var(--fg1);
    }
    .ds-list-row .title.danger { color: var(--color-error-dark); }
    .ds-list-row .subtitle {
      font-size: 12px;
      color: var(--fg3);
      margin-top: 2px;
    }

    /* ── Group label (above list card) ───────────────────── */
    .ds-group-label {
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-md);
      color: var(--fg4);
      padding: 0 4px 8px;
    }
    .ds-section-title {
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-md);
      margin-bottom: 10px;
    }
    .ds-section-title.accent { color: var(--color-primary-pure); }
    .ds-section-title.muted  { color: var(--fg4); }

    /* ── Bottom tab bar (floating pill — matches floating variant) ─ */
    .ds-bottom-tab-bar {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 24px;
      background: var(--bg);
      border-radius: 18px;
      box-shadow: var(--shadow-level-2);
      display: flex;
      padding: 6px;
      z-index: 5;
    }
    .ds-tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-standard);
    }
    .ds-tab-item.active {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
    }
    .ds-tab-item:not(.active) { color: var(--fg3); }
    .ds-tab-label {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
    }

    /* ── Pagination dots ─────────────────────────────────── */
    .ds-pagination-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .ds-page-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--color-neutral-high-medium);
      transition: all var(--duration-base) var(--ease-standard);
    }
    .ds-page-dot.active {
      width: 24px;
      background: var(--color-primary-pure);
    }
    .ds-page-dot.seen { background: var(--color-primary-medium); }

    /* ── Floating Action Button ──────────────────────────── */
    .ds-fab {
      position: absolute;
      right: 20px;
      bottom: 44px;
      height: var(--button-height-lg);
      padding: 0 20px;
      border-radius: var(--radius-md);
      background: var(--color-primary-pure);
      color: var(--color-fg-on-primary);
      border: 0;
      box-shadow: var(--shadow-level-2);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family-base);
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-xxs);
      cursor: pointer;
      z-index: 4;
    }

    /* ── Segmented control (iOS style) ───────────────────── */
    .ds-segmented {
      display: flex;
      background: var(--color-neutral-high-light);
      border-radius: var(--radius-full);
      padding: 3px;
    }
    .ds-segmented-item {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      cursor: pointer;
      color: var(--fg3);
      transition: all var(--duration-fast) var(--ease-standard);
    }
    .ds-segmented-item.active {
      background: var(--bg);
      color: var(--color-primary-pure);
      box-shadow: var(--shadow-level-1);
    }

    /* ── Pill badge (category tag) ───────────────────────── */
    .ds-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      font-family: var(--font-family-base);
    }
    .ds-badge.primary { background: var(--color-primary-light); color: var(--color-primary-pure); }
    .ds-badge.dark    { background: var(--color-near-black); color: var(--color-fg-on-primary); opacity: 0.85; }

    /* ── Card ────────────────────────────────────────────── */
    .ds-card {
      background: var(--bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      transition: all var(--duration-base) var(--ease-standard);
    }
    .ds-card.elevated {
      border-color: transparent;
      box-shadow: var(--shadow-level-2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════
       TOKEN HELPERS
       Helpers so screens can pull token values semantically.
    ═══════════════════════════════════════════════════════════ */
    const T = {
      // font sizes
      fsMicro: 11, fsCaption: 12, fsFoot: 13,
      fs: {
        xxs: 'var(--font-size-xxs)',
        xs:  'var(--font-size-xs)',
        sm:  'var(--font-size-sm)',
        md:  'var(--font-size-md)',
        lg:  'var(--font-size-lg)',
      },
      fw: {
        regular: 'var(--font-weight-regular)',
        medium:  'var(--font-weight-medium)',
        bold:    'var(--font-weight-bold)',
      },
      ff: {
        base:      'var(--font-family-base)',
        editorial: 'var(--font-family-editorial)',
        mono:      'var(--font-family-mono)',
      },
      r: {
        xxs:  'var(--radius-xxs)',
        xs:   'var(--radius-xs)',
        sm:   'var(--radius-sm)',
        md:   'var(--radius-md)',
        lg:   'var(--radius-lg)',
        full: 'var(--radius-full)',
      },
      shadow: {
        l1: 'var(--shadow-level-1)',
        l2: 'var(--shadow-level-2)',
        l3: 'var(--shadow-level-3)',
        l4: 'var(--shadow-level-4)',
      },
      ease: 'var(--ease-standard)',
      dur: {
        micro: 'var(--duration-micro)',
        fast:  'var(--duration-fast)',
        base:  'var(--duration-base)',
      },
    };

    /* ═══════════════════════════════════════════════════════════
       ICON COMPONENT
    ═══════════════════════════════════════════════════════════ */
    const IP = {
      home:     ['M3 11l9-8 9 8','M5 10v10h14V10'],
      search:   ['M21 21l-4.3-4.3'], search_circle: [11,11,7],
      bell:     ['M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9','M13.7 21a2 2 0 01-3.4 0'],
      user:     ['M4 20c0-4 4-6 8-6s8 2 8 6'], user_circle: [12,8,4],
      settings: ['M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 01-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 010-4h.1A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h0a1.7 1.7 0 001-1.5V3a2 2 0 014 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v0a1.7 1.7 0 001.5 1H21a2 2 0 010 4h-.1a1.7 1.7 0 00-1.5 1z'], settings_circle: [12,12,3],
      heart:    ['M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z'],
      plus:     ['M12 5v14M5 12h14'],
      check:    ['M20 6L9 17l-5-5'],
      x:        ['M18 6L6 18M6 6l12 12'],
      arrow_up_right: ['M7 17L17 7M7 7h10v10'],
      arrow_right: ['M5 12h14M12 5l7 7-7 7'],
      arrow_left: ['M19 12H5M12 19l-7-7 7-7'],
      chevron_right: ['M9 6l6 6-6 6'],
      chevron_down: ['M6 9l6 6 6-6'],
      mail: ['M22 6l-10 7L2 6'], mail_rect: [2,4,20,16,2],
      lock: ['M7 11V7a5 5 0 0110 0v4'], lock_rect: [3,11,18,10,2],
      more: [], more_h: [[5,12,1.5],[12,12,1.5],[19,12,1.5]],
      send: ['M22 2L11 13','M22 2l-7 20-4-9-9-4 20-7z'],
      star: ['M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.9L12 17.8 5.8 21l1.2-6.9-5-4.9 6.9-1z'],
      eye: ['M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'], eye_circle: [12,12,3],
      filter: ['M22 3H2l8 9.5V19l4 2v-8.5z'],
      bookmark: ['M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z'],
      mic: ['M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z','M19 10v2a7 7 0 01-14 0v-2','M12 19v4','M8 23h8'],
      clock: ['M12 6v6l4 2'], clock_circle: [12,12,10],
      calendar: ['M8 2v4','M16 2v4','M3 10h18'], calendar_rect: [3,4,18,18,2],
      message: ['M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z'],
      phone: ['M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3.1-8.7A2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L8 9.6a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z'],
      inbox: ['M22 12h-6l-2 3h-4l-2-3H2','M5.5 5.5L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.5-6.5A2 2 0 0016.8 4H7.2a2 2 0 00-1.7 1.5z'],
      tag: ['M20.6 13.4L12 22 2 12V2h10l8.6 8.6a2 2 0 010 2.8z'], tag_circle: [7,7,1.5],
      globe: ['M2 12h20','M12 2a15 15 0 010 20','M12 2a15 15 0 000 20'], globe_circle: [12,12,10],
      shield: ['M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'],
      info: ['M12 16v-4','M12 8h.01'], info_circle: [12,12,10],
      help: ['M9.1 9a3 3 0 115.8 1c0 2-3 3-3 3','M12 17h.01'], help_circle: [12,12,10],
      logout: ['M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4','M16 17l5-5-5-5','M21 12H9'],
      moon: ['M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z'],
      flame: ['M8.5 14.5A2.5 2.5 0 0011 17c0 1.4-.9 2-2 2-1.5 0-3-1.3-3-3.5 0-4 6-8 6-8s0 4 3 5.5a5.5 5.5 0 01-2 10.5c-1.5 0-4-.5-4-4 0-1.3.7-3 2-4.5z'],
      utensils: ['M3 2v7c0 1.1.9 2 2 2h2v11','M7 2v20','M21 15V2a5 5 0 00-3 4.5V12c0 1.7 1 3 3 3z'],
    };

    function Icon({ name, size = 22, color = 'currentColor', stroke = 1.75, style = {} }) {
      const paths = IP[name] || [];
      const circle = IP[name + '_circle'];
      const rect = IP[name + '_rect'];
      const circles = IP[name + '_h'];
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
             stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={style}>
          {paths.map((d, i) => <path key={'p'+i} d={d} />)}
          {circle && <circle cx={circle[0]} cy={circle[1]} r={circle[2]} />}
          {rect && <rect x={rect[0]} y={rect[1]} width={rect[2]} height={rect[3]} rx={rect[4]} />}
          {circles && circles.map((c,i) => <circle key={'c'+i} cx={c[0]} cy={c[1]} r={c[2]} fill={color} stroke="none" />)}
        </svg>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       UI PRIMITIVES — all styling pulled from tokens
    ═══════════════════════════════════════════════════════════ */
    function Button({ variant = 'primary', size = 'lg', children, iconLeft, iconRight, onClick, disabled, style = {} }) {
      const base = {
        fontFamily: T.ff.base, fontWeight: T.fw.bold,
        border: 0, borderRadius: T.r.sm, cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'inline-flex', alignItems: 'center', gap: 8,
        transition: `all ${T.dur.fast} ${T.ease}`,
        opacity: disabled ? 'var(--opacity-medium)' : 1,
      };
      const sizes = {
        lg: { height: 'var(--button-height-lg)', padding: '0 var(--button-padding-lg)', fontSize: T.fs.xs },
        sm: { height: 'var(--button-height-sm)', padding: '0 var(--button-padding-sm)', fontSize: T.fs.xxs },
      };
      const variants = {
        primary: { background: 'var(--color-primary-pure)', color: 'var(--color-fg-on-primary)' },
        outline: { background: 'var(--bg)', color: 'var(--color-primary-pure)', boxShadow: 'inset 0 0 0 1.5px var(--color-primary-pure)' },
        text:    { background: 'transparent', color: 'var(--color-primary-pure)', padding: '0 var(--spacing-nano)' },
        danger:  { background: 'var(--color-error-medium)', color: 'var(--color-fg-on-primary)' },
      };
      return (
        <button style={{ ...base, ...sizes[size], ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>
          {iconLeft && <Icon name={iconLeft} size={size === 'lg' ? 18 : 16} />}
          {children}
          {iconRight && <Icon name={iconRight} size={size === 'lg' ? 18 : 16} />}
        </button>
      );
    }

    function TextField({ label, value, onChange, placeholder, help, error, type = 'text', iconLeft, disabled }) {
      const [focus, setFocus] = useState(false);
      return (
        <label style={{ display: 'flex', flexDirection: 'column', gap: 4, width: '100%' }}>
          {label && <span style={{ fontSize: 12, fontWeight: T.fw.bold, color: 'var(--fg1)' }}>{label}</span>}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8, height: 44, padding: '0 12px',
            background: disabled ? 'var(--color-neutral-high-extra-light)' : 'var(--bg)',
            border: `1px solid ${error ? 'var(--color-error-medium)' : focus ? 'var(--color-primary-pure)' : 'var(--border)'}`,
            borderRadius: T.r.sm,
            boxShadow: focus && !error ? '0 0 0 3px rgba(25,179,159,.24)' : error ? '0 0 0 3px rgba(202,74,90,.18)' : 'none',
            transition: `all ${T.dur.fast} ${T.ease}`,
          }}>
            {iconLeft && <Icon name={iconLeft} size={18} color="var(--fg3)" />}
            <input type={type} value={value} onChange={e => onChange?.(e.target.value)}
                   placeholder={placeholder} disabled={disabled}
                   onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
                   style={{ flex: 1, border: 0, outline: 'none', background: 'transparent',
                            fontFamily: T.ff.base, fontSize: T.fs.xxs, color: 'var(--fg1)' }} />
          </div>
          {help && <span style={{ fontSize: 11, color: error ? 'var(--color-error-medium)' : 'var(--fg3)' }}>{help}</span>}

    function Chip({ children, selected, onClick, onRemove, soft }) {
      return (
        <span onClick={onClick} style={{
          height: 32, padding: onRemove ? '0 8px 0 14px' : '0 14px',
          borderRadius: T.r.full, fontFamily: T.ff.base,
          fontSize: 13, fontWeight: T.fw.medium,
          display: 'inline-flex', alignItems: 'center', gap: 6,

          color: selected ? 'var(--color-fg-on-primary)' : soft ? 'var(--color-primary-dark)' : 'var(--fg1)',
          border: `1px solid ${selected ? 'var(--color-primary-pure)' : soft ? 'var(--color-primary-medium)' : 'var(--border)'}`,
          cursor: 'pointer', transition: `all ${T.dur.fast} ${T.ease}`,
        }}>
          {children}
          {onRemove && <span onClick={e => { e.stopPropagation(); onRemove(); }} style={{ opacity: .7, cursor: 'pointer' }}>×</span>}

        <div onClick={() => onChange?.(!checked)} style={{

    /* ═══════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════ */
    function RecipeSwipeScreen() {
      const recipes = [
        { id: 1, title: 'Charred Miso Eggplant',   mins: 35, diff: 'Easy',   cuisine: 'Japanese', color: 'var(--color-primary-dark)',  fg: 'var(--color-fg-on-primary)', tags: ['Vegan', '4 ingredients'] },
        { id: 2, title: 'Spiced Lamb Flatbreads',  mins: 45, diff: 'Medium', cuisine: 'Lebanese', color: 'var(--color-error-medium)',  fg: 'var(--color-fg-on-primary)', tags: ['High protein'] },
        { id: 3, title: 'Lemon Ricotta Pasta',     mins: 25, diff: 'Easy',   cuisine: 'Italian',  color: 'var(--color-warning-light)', fg: 'var(--fg2)',                  tags: ['Quick'] },
      ];
      const [idx, setIdx] = useState(0);
      const [drag, setDrag] = useState(0);

      const top = recipes[idx % recipes.length];
      const next = recipes[(idx + 1) % recipes.length];
      const rotation = drag / 12;
      const likeOpacity = Math.max(0, Math.min(1, drag / 80));
      const nopeOpacity = Math.max(0, Math.min(1, -drag / 80));

      const swipe = (dir) => {
        setDrag(dir * 400);
        setTimeout(() => { setIdx(i => i + 1); setDrag(0); }, 220);
      };

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg-subtle)', paddingTop: 54, boxSizing: 'border-box' }}>
          <AppHeaderCompact
            leading={<Icon name="user" size={24} color="var(--fg3)" />}
            title="Discover"
            trailing={<Icon name="filter" size={22} color="var(--fg3)" />}
          />

          <div style={{ flex: 1, position: 'relative', padding: '10px 20px' }}>
            <div style={{
              position: 'absolute', top: 18, left: 32, right: 32, bottom: 28,
              borderRadius: T.r.lg, background: next.color, transform: 'scale(0.95)',
              boxShadow: T.shadow.l1,
            }} />
            <div style={{
              position: 'absolute', top: 10, left: 20, right: 20, bottom: 20,
              borderRadius: T.r.lg, background: top.color, overflow: 'hidden',
              transform: `translateX(${drag}px) rotate(${rotation}deg)`,
              transition: drag === 0 ? 'none' : `transform ${T.dur.base} ${T.ease}`,
              boxShadow: T.shadow.l3, color: top.fg,
              display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: 22,
            }}>
              <div style={{ position: 'absolute', top: 22, left: 22, padding: '6px 14px', border: '3px solid var(--color-success-medium)', borderRadius: T.r.sm, color: 'var(--color-success-medium)', fontWeight: 800, letterSpacing: 'var(--letter-spacing-md)', transform: 'rotate(-12deg)', opacity: likeOpacity, background: 'rgba(255,255,255,0.9)' }}>YUM</div>
              <div style={{ position: 'absolute', top: 22, right: 22, padding: '6px 14px', border: '3px solid var(--color-error-medium)',   borderRadius: T.r.sm, color: 'var(--color-error-medium)',   fontWeight: 800, letterSpacing: 'var(--letter-spacing-md)', transform: 'rotate(12deg)',  opacity: nopeOpacity, background: 'rgba(255,255,255,0.9)' }}>NOPE</div>

              <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
                {top.tags.map(t => (
                  <span key={t} style={{ padding: '4px 10px', background: 'rgba(255,255,255,0.22)', border: '1px solid rgba(255,255,255,0.35)', borderRadius: T.r.full, fontSize: 11, fontWeight: T.fw.medium }}>{t}</span>
                ))}
              </div>
              <div style={{ fontSize: 12, fontWeight: T.fw.bold, opacity: 0.8, textTransform: 'uppercase', letterSpacing: 'var(--letter-spacing-md)', marginBottom: 6 }}>{top.cuisine}</div>
              <div style={{ fontFamily: T.ff.editorial, fontSize: T.fs.lg, fontWeight: T.fw.medium, lineHeight: 1.1, marginBottom: 14 }}>{top.title}</div>
              <div style={{ display: 'flex', gap: 18, alignItems: 'center', fontSize: 13, fontWeight: T.fw.medium }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><Icon name="clock" size={16} color={top.fg} /> {top.mins} min</span>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><Icon name="flame" size={16} color={top.fg} /> {top.diff}</span>
              </div>
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 20, paddingBottom: 36 }}>
            <button onClick={() => swipe(-1)} style={{ width: 56, height: 56, borderRadius: '50%', border: 0, background: 'var(--bg)', boxShadow: T.shadow.l2, color: 'var(--color-error-medium)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="x" size={26} stroke={2.5} />
            </button>
            <button style={{ width: 48, height: 48, borderRadius: '50%', border: 0, background: 'var(--bg)', boxShadow: T.shadow.l1, color: 'var(--color-highlight-medium)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="bookmark" size={20} />
            </button>
            <button onClick={() => swipe(1)} style={{ width: 56, height: 56, borderRadius: '50%', border: 0, background: 'var(--color-primary-pure)', boxShadow: T.shadow.l2, color: 'var(--color-fg-on-primary)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="heart" size={26} stroke={2.5} />
            </button>
          </div>
        </div>
      );
    }

        { time: '10:00', end: '11:00', title: 'Design sync',         loc: 'Zoom · w/ Priya',     color: 'var(--color-primary-pure)' },
        { time: '12:30', end: '13:15', title: 'Lunch with Jordan',   loc: 'Hakaba, SoMa',        color: 'var(--color-warning-medium)' },
        { time: '14:00', end: '15:30', title: 'Recipe photography',  loc: 'Studio B',            color: 'var(--color-highlight-medium)' },
        { time: '18:30', end: '20:00', title: 'Sourdough class',     loc: 'Community Center',    color: 'var(--color-error-medium)' },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)', paddingTop: 54, boxSizing: 'border-box' }}>
          <AppHeaderLarge
            title="April 2026"
            subtitle={`Thursday, the ${selected}th`}
            actions={<>
              <IconButton variant="neutral" icon="search" />
              <IconButton variant="primary-solid" icon="plus" size={18} />
            </>}
          />

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', padding: '6px 12px 4px' }}>
            {['S','M','T','W','T','F','S'].map((d, i) => (
              <div key={i} style={{ textAlign: 'center', fontSize: 11, fontWeight: T.fw.bold, color: i === 0 || i === 6 ? 'var(--fg4)' : 'var(--fg3)', letterSpacing: 'var(--letter-spacing-md)' }}>{d}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', padding: '6px 12px 12px', rowGap: 4 }}>
            {cells.map((d, i) => {
              if (d === null) return <div key={i} />;
              const sel = d === selected;
              const isToday = d === today;
              const hasEvt = daysWithEvents.has(d);
              const dow = i % 7;
              const weekend = dow === 0 || dow === 6;
              return (
                <div key={i} onClick={() => setSelected(d)} style={{ aspectRatio: '1 / 1.1', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3, cursor: 'pointer' }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: '50%',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: T.fs.xxs, fontWeight: isToday || sel ? T.fw.bold : T.fw.medium,
                    background: sel ? 'var(--color-primary-pure)' : isToday ? 'var(--color-primary-light)' : 'transparent',
                    color: sel ? 'var(--color-fg-on-primary)' : isToday ? 'var(--color-primary-pure)' : weekend ? 'var(--fg4)' : 'var(--fg1)',
                    transition: `all ${T.dur.fast} ${T.ease}`,
                  }}>{d}</div>
                  <div style={{ width: 4, height: 4, borderRadius: '50%', background: hasEvt && !sel ? 'var(--color-primary-pure)' : 'transparent' }} />
                </div>
              );
            })}
          </div>
          <div style={{ height: 8, background: 'var(--color-neutral-high-extra-light)' }} />
          <div style={{ flex: 1, overflow: 'auto', padding: '16px 20px 36px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: T.fw.bold, color: 'var(--fg1)' }}>{events.length} events today</div>
              <div style={{ fontSize: 12, fontWeight: T.fw.medium, color: 'var(--color-primary-pure)' }}>View week</div>
            </div>
            <div style={{ position: 'relative', paddingLeft: 56 }}>
              <div style={{ position: 'absolute', left: 50, top: 6, bottom: 6, width: 1, background: 'var(--border-subtle)' }} />
              {events.map((e, i) => (
                <div key={i} style={{ position: 'relative', marginBottom: 12 }}>
                  <div style={{ position: 'absolute', left: -56, top: 4, fontSize: 11, fontWeight: T.fw.bold, color: 'var(--fg3)', width: 40, textAlign: 'right' }}>{e.time}</div>
                  <div style={{ position: 'absolute', left: -10, top: 8, width: 9, height: 9, borderRadius: '50%', background: e.color, border: '2px solid var(--bg)', boxShadow: '0 0 0 1px var(--border)' }} />
                  <div style={{ padding: '10px 12px', background: 'var(--bg)', border: '1px solid var(--border-subtle)', borderRadius: T.r.sm }}>
                    <div style={{ fontWeight: T.fw.bold, fontSize: T.fs.xxs, color: 'var(--fg1)', marginBottom: 3 }}>{e.title}</div>
                    <div style={{ fontSize: 11, color: 'var(--fg3)' }}>{e.time}–{e.end} · {e.loc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       SCREEN 8 — SUBSCRIPTION
    ═══════════════════════════════════════════════════════════ */
    function SubscriptionScreen() {
      const [selected, setSelected] = useState('premium');
      const plans = [
        { id: 'starter', name: 'Starter', meals: 3,  price: 59,  per: 24.50, tag: null,           blurb: 'Three chef-designed meals. Just add a weeknight.' },
        { id: 'premium', name: 'Premium', meals: 6,  price: 109, per: 21.80, tag: 'Most popular', blurb: 'Six meals, including seasonal picks. Swap anytime.' },
        { id: 'family',  name: 'Family',  meals: 10, price: 169, per: 19.90, tag: 'Best value',   blurb: 'Ten meals for four people. Pause or skip weeks.' },
      ];
      const included = ['Fresh, pre-portioned ingredients', 'Carbon-neutral delivery', 'Cancel or pause anytime'];
      const activePlan = plans.find(p => p.id === selected);
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg-subtle)', paddingTop: 54, boxSizing: 'border-box' }}>
          <AppHeaderCompact
            leading={<Icon name="x" size={22} color="var(--fg2)" />}
            title="Choose plan"
          />

          <div style={{ flex: 1, overflow: 'auto', padding: '8px 20px 24px' }}>
            <div style={{ textAlign: 'center', padding: '16px 8px 24px' }}>
              <div style={{ fontFamily: T.ff.editorial, fontSize: T.fs.lg, fontWeight: T.fw.medium, lineHeight: 1.1, color: 'var(--fg1)', marginBottom: 8 }}>A plan for your weeknights</div>
              <div style={{ fontSize: T.fs.xxs, color: 'var(--fg3)' }}>Meal kits delivered every Sunday.</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 24 }}>
              {plans.map(p => {
                const on = selected === p.id;
                return (
                  <div key={p.id} onClick={() => setSelected(p.id)} style={{
                    position: 'relative', padding: 16, borderRadius: T.r.md, background: 'var(--bg)',
                    border: on ? '2px solid var(--color-primary-pure)' : '1px solid var(--border)',
                    boxShadow: on ? `0 0 0 3px rgba(25,179,159,0.18), var(--shadow-level-1)` : 'none',
                    cursor: 'pointer', transition: `all ${T.dur.base} ${T.ease}`,
                  }}>
                    {p.tag && <div style={{ position: 'absolute', top: -10, right: 16, padding: '3px 10px', background: 'var(--color-primary-pure)', color: 'var(--color-fg-on-primary)', fontSize: 10, fontWeight: T.fw.bold, letterSpacing: 'var(--letter-spacing-sm)', borderRadius: T.r.full, textTransform: 'uppercase' }}>{p.tag}</div>}
                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                      <div style={{ width: 22, height: 22, borderRadius: '50%', flexShrink: 0, border: on ? '2px solid var(--color-primary-pure)' : '2px solid var(--color-neutral-low-extra-light)', background: on ? 'var(--color-primary-pure)' : 'var(--bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 2 }}>
                        {on && <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--color-fg-on-primary)' }} />}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 4 }}>
                          <div style={{ fontSize: 17, fontWeight: T.fw.bold, color: 'var(--fg1)' }}>{p.name}</div>
                          <div style={{ textAlign: 'right' }}>
                            <span style={{ fontFamily: T.ff.editorial, fontSize: T.fs.md, fontWeight: T.fw.bold, color: 'var(--fg1)' }}>${p.price}</span>
                            <span style={{ fontSize: 12, color: 'var(--fg3)', marginLeft: 2 }}>/wk</span>
                          </div>
                        </div>
                        <div style={{ fontSize: 12, color: 'var(--fg3)', marginBottom: 8 }}>{p.meals} meals per week · ${p.per.toFixed(2)} per serving</div>
                        <div style={{ fontSize: 13, color: 'var(--fg2)', lineHeight: 1.4 }}>{p.blurb}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <Card padding={16} style={{ marginBottom: 12 }}>
              <GroupLabel>Every plan includes</GroupLabel>
              {included.map(item => (
                <div key={item} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
                  <div style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--color-primary-light)', color: 'var(--color-primary-pure)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name="check" size={12} stroke={2.5} />
                  </div>
                  <div style={{ fontSize: 13, color: 'var(--fg2)' }}>{item}</div>
                </div>
              ))}
            </Card>
          </div>
          <div style={{ padding: '12px 20px 28px', background: 'var(--bg)', borderTop: '1px solid var(--border-subtle)' }}>
            <Button style={{ width: '100%', justifyContent: 'center', height: 'var(--button-height-lg)', fontSize: 15 }} iconRight="arrow_right">
              Subscribe · ${activePlan.price}/wk
            </Button>
            <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--fg4)', marginTop: 10 }}>First delivery in 3 days · Cancel anytime</div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       PANNABLE CANVAS APP
    ═══════════════════════════════════════════════════════════ */
    const SECTIONS = [
      {
        label: 'Content & Feeds',
        phones: [
          { name: 'News Feed',     Screen: NewsFeedScreen },
          { name: 'Recipe Swipe',  Screen: RecipeSwipeScreen },
        ],
      },
      {
        label: 'User & Auth',
        phones: [
          { name: 'Settings',      Screen: SettingsScreen2 },
          { name: 'Onboarding',    Screen: OnboardingFlow },
        ],
      },
      {
        label: 'Messaging',
        phones: [
          { name: 'Group Chat',    Screen: GroupChatScreen },
          { name: 'Email',         Screen: EmailScreen },
        ],
      },
      {
        label: 'Time & Commerce',
        phones: [
          { name: 'Calendar',      Screen: CalendarScreen },
          { name: 'Subscription',  Screen: SubscriptionScreen },
        ],
      },
    ];

    function App() {
      const wrapRef = useRef(null);
      const [pan, setPan] = useState({ x: 60, y: 60 });
      const [zoom, setZoom] = useState(0.52);
      const isDragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });

      const onMouseDown = useCallback((e) => {
        if (e.button !== 0) return;
        isDragging.current = true;
        lastPos.current = { x: e.clientX, y: e.clientY };
        wrapRef.current.classList.add('dragging');
      }, []);

      const onMouseMove = useCallback((e) => {
        if (!isDragging.current) return;
        const dx = e.clientX - lastPos.current.x;
        const dy = e.clientY - lastPos.current.y;
        lastPos.current = { x: e.clientX, y: e.clientY };
        setPan(p => ({ x: p.x + dx, y: p.y + dy }));
      }, []);

      const onMouseUp = useCallback(() => {
        isDragging.current = false;
        wrapRef.current?.classList.remove('dragging');
      }, []);

      useEffect(() => {
        window.addEventListener('mouseup', onMouseUp);
        return () => window.removeEventListener('mouseup', onMouseUp);
      }, [onMouseUp]);

      useEffect(() => {
        const el = wrapRef.current;
        if (!el) return;
        const onWheel = (e) => {
          e.preventDefault();
          setZoom(z => Math.min(2.0, Math.max(0.2, z - e.deltaY * 0.001)));
        };
        el.addEventListener('wheel', onWheel, { passive: false });
        return () => el.removeEventListener('wheel', onWheel);
      }, []);

      useEffect(() => {
        const onKey = (e) => {
          if (e.code === 'Space') {
            e.preventDefault();
            setPan({ x: 60, y: 60 });
            setZoom(0.52);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="app-layout">
          <div className="topbar">
            <a href="index.html" className="topbar-back">← Toolkit</a>
            <div className="topbar-sep" />
            <div className="topbar-title">Generic Screens</div>
            <button className="topbar-reset" onClick={() => { setPan({ x: 60, y: 60 }); setZoom(0.52); }}>
              Reset view
            </button>
            <div className="topbar-hint">Drag to pan · Scroll to zoom · Space to reset</div>
          </div>
          <div className="canvas-wrap" ref={wrapRef}
               onMouseDown={onMouseDown}
               onMouseMove={onMouseMove}>
            <div className="canvas-inner"
                 style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})` }}>
              <div className="canvas-content">
                {SECTIONS.map(section => (
                  <div key={section.label} className="section">
                    <div className="section-label">{section.label}</div>
                    <div className="section-phones">
                      {section.phones.map(({ name, Screen }) => (
                        <div key={name} className="phone-col">
                          <IOSDevice>
                            <Screen />
                          </IOSDevice>
                          <div className="phone-name">{name}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
